<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArtSpot - Settings</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body class="settings-page">

  <nav class="navbar">
    <a href="feed.html">
      <img src="images/artspot.png" alt="ArtSpot Logo" class="nav-logo" />
    </a>
    <div class="nav-search">
      <span class="search-mag">&#9906;</span>
      <input type="text" placeholder="Search..." class="search-input" />
      <img src="images/Navigation.png" alt="Search" class="search-icon" />
    </div>
    <a href="explore.html" class="nav-item">
      <img src="images/explore.png" class="nav-icon" />
      <span>Explore</span>
    </a>
    <a href="post.html" class="nav-item">
      <img src="images/create.png" class="nav-icon" />
      <span>Create</span>
    </a>
    <a href="alerts.html" class="nav-item">
      <img src="images/bell.png" class="nav-icon" />
      <span>Alerts</span>
    </a>
    <a href="profile.html" class="nav-item">
      <img src="images/user.png" class="nav-icon" />
      <span>Profile</span>
    </a>
    <a href="settings.html" class="nav-item">
      <img src="images/Settings.png" class="nav-icon" />
      <span>Settings</span>
    </a>
  </nav>

  <div class="settings-container">

    <!-- PROFILE SETTINGS -->
    <div class="settings-card">
      <h2 class="settings-heading">Profile Settings</h2>

      <div class="settings-photo-row">
        <img src="images/smile.jpg" alt="Profile" class="settings-avatar" />
        <button class="change-photo-btn">Change Photo</button>
      </div>

      <div class="field-group">
        <label class="field-label">Display Name</label>
        <input type="text" class="field-input" value="Jane Doe" />
      </div>

      <div class="field-group">
        <label class="field-label">Username</label>
        <input type="text" class="field-input" value="janedoe_art" />
      </div>

      <div class="field-group">
        <label class="field-label">Bio</label>
        <input type="text" class="field-input" value="Digital artist & illustrator based in PA. Creating vibrant worlds through pixels." />
      </div>

      <div class="settings-btns">
        <button class="btn-cancel settings-cancel">Cancel</button>
        <button class="btn-save">Save Changes</button>
      </div>
    </div>

    <!-- NOTIFICATION PREFERENCES -->
    <div class="settings-card">
      <h2 class="settings-heading">Notification Preferences</h2>

      <div class="settings-notif-row">
        <div class="notif-text-group">
          <p class="notif-title">Email Notifications</p>
          <p class="notif-subtitle">Receive notifications via email</p>
        </div>
        <label class="toggle">
          <input type="checkbox" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="settings-notif-row" style="margin-top: 40px;">
        <div class="notif-text-group">
          <p class="notif-title">Push Notifications</p>
          <p class="notif-subtitle">Receive push notifications in your browser.</p>
        </div>
        <label class="toggle">
          <input type="checkbox" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- LOG OUT -->
    <div class="settings-card settings-logout-card">
      <div class="logout-left">
        <h2 class="settings-heading">Log Out</h2>
        <p class="logout-subtitle">Sign out of your account.</p>
      </div>
      <button class="btn-logout">Log Out</button>
    </div>

  </div>

</body>
</html>
