<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArtSpot - Feed</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;700&family=Roboto:wght@400&display=swap" rel="stylesheet"/>
</head>
<body class="feed-page">

  <nav class="navbar">

    <img src="images/artspot.png" alt="ArtSpot Logo" class="nav-logo" />

    <div class="nav-search">
        <span class="search-mag">&#9906;</span>
      <input type="text" placeholder="Search..." class="search-input" />
      <a href="#"><img src="images/Navigation.png" alt="Search" class="search-icon" /></a>
    </div>

    <div class="nav-item">
      <img src="images/explore.png" alt="Explore" class="nav-icon" />
      <span>Explore</span>
    </div>

    <div class="nav-item">
      <img src="images/create.png" alt="Create" class="nav-icon" />
      <span>Create</span>
    </div>

    <div class="nav-item">
      <img src="images/bell.png" alt="Alerts" class="nav-icon" />
      <span>Alerts</span>
    </div>

    <div class="nav-item">
      <img src="images/user.png" alt="Profile" class="nav-icon" />
      <span>Profile</span>
    </div>

    <div class="nav-item">
      <img src="images/Settings.png" alt="Settings" class="nav-icon" />
      <span>Settings</span>
    </div>

  </nav>

  <div class="feed-content">
  <h2 class="trending-title">Trending Today</h2>

  <div class="tag-buttons">
    <div class="tag-row">
      <button class="tag-btn">#minimalism</button>
      <button class="tag-btn">#abstract</button>
      <button class="tag-btn">#portrait</button>
      <button class="tag-btn">#landscape</button>
      <button class="tag-btn">#typography</button>
    </div>
    <div class="tag-row">
      <button class="tag-btn">#branding</button>
    </div>
  </div>
</div>

<h2 class="for-you-title">For You</h2>
</div>

<div class="row">
  <div class="column">
    <img src="mountain.jpg">
    <img src="polaroid.jpg">
    <img src="mural.jpg">
  </div>
  <div class="column">
    <img src="sketch.jpg">
    <img src="pattern.jpg">
    <img src="shapes.jpg">
  </div>
  <div class="column">
    <img src="frame.jpg">
    <img src="warm.jpg">
    <img src="photography.jpg">
  </div>
  <div class="column">
    <img src="plant.jpg">
    <img src="lake.jpg">
    <img src="book.jpg">

  </div>
</div>

</body>
</html>
