<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArtSpot</title>
  <link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;700&family=Roboto:wght@400&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="splash-container">

    <!-- LEFT COLUMN -->
    <div class="splash-left">
      <img src="images/artspot.png" alt="ArtSpot Logo" class="logo" />
      <h1 class="headline">Showcase Your Creativity</h1>
      <p class="subheadline">Join a large community of artists, designers, and photographers. Share your work, get inspired, and connect with creative minds from around the world.</p>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="splash-right">
      <div class="login-box">
        <h2 class="welcome-text">Welcome</h2>

        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" placeholder="your@email.com" />
        </div>

        <div class="form-group" style="margin-top: 15px;">
          <label for="password">Password:</label>
          <input type="password" id="password" placeholder="*******" />
        </div>

        <p class="signup-link"><a href="#">Not a Member? Sign up</a></p>

        <a href="feed.html"><button class="login-btn">Log In</button></a>
      </div>
    </div>

  </div>

</body>
</html>
