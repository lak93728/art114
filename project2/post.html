<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArtSpot - Create a Post</title>

<link rel="icon" type="image/png" href="images/favicon.png" />

  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;700;900&family=Roboto:wght@400&display=swap" rel="stylesheet"/>
</head>
<body class="create-page">

  <!-- nav bar -->
  <nav class="navbar">
    <a href="feed.html">
      <img src="images/artspot.png" alt="ArtSpot Logo" class="nav-logo" />
    </a>

    <div class="nav-search">      
      <img src="images/search.png" alt="Search" class="search-icon" />
      <input type="text" placeholder="Search..." class="search-input" />

    </div>

    <a href="explore.html" class="nav-item">
      <img src="images/explore.png" class="nav-icon" />
      <span>Explore</span>
    </a>
    <a href="post.html" class="nav-item">
      <img src="images/create.png" class="nav-icon" />
      <span>Create</span>
    </a>
    <a href="notifications.html" class="nav-item">
      <img src="images/bell.png" class="nav-icon" />
      <span>Alerts</span>
    </a>
    <a href="profile.html" class="nav-item">
      <img src="images/user.png" class="nav-icon" />
      <span>Profile</span>
    </a>
    <a href="settings.html" class="nav-item">
      <img src="images/Settings.png" class="nav-icon" />
      <span>Settings</span>
    </a>

    <!-- menu button -->
    <button class="hamburger" onclick="toggleMenu()" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- mobile nav -->
  <div class="mobile-menu" id="mobileMenu">
    <button class="mobile-menu-close" onclick="toggleMenu()">&#10005;</button>
    <a href="explore.html" class="mobile-nav-item">
      <img src="images/explore.png" class="mobile-nav-icon" />
      <span>Explore</span>
    </a>
    <a href="post.html" class="mobile-nav-item">
      <img src="images/create.png" class="mobile-nav-icon" />
      <span>Create</span>
    </a>
    <a href="notifications.html" class="mobile-nav-item">
      <img src="images/bell.png" class="mobile-nav-icon" />
      <span>Alerts</span>
    </a>
    <a href="profile.html" class="mobile-nav-item">
      <img src="images/user.png" class="mobile-nav-icon" />
      <span>Profile</span>
    </a>
    <a href="settings.html" class="mobile-nav-item">
      <img src="images/Settings.png" class="mobile-nav-icon" />
      <span>Settings</span>
    </a>
  </div>

  <div class="create-container">

    <h1 class="create-title">Create a Post</h1>
    <p class="create-subtitle">Choose an image</p>

    <div class="upload-box">
      <img src="images/upload.png" alt="Upload" class="upload-icon" />
      <p class="upload-text">Click to upload or drag and drop.</p>
    </div>

    <div class="field-group">
      <label class="field-label">Title</label>
      <input type="text" class="field-input" placeholder="Give your work a title" />
    </div>

    <div class="field-group">
      <label class="field-label">Description</label>
      <textarea class="field-input field-textarea" placeholder="Tell the story behind your work."></textarea>
    </div>

    <div class="field-group">
      <label class="field-label">Tags</label>
      <input type="text" class="field-input" placeholder="#photography, #digitalart, #painting" />
    </div>

    <div class="create-buttons">
      <button class="btn-cancel">Cancel</button>
      <button class="btn-upload">Upload</button>
    </div>

  </div>

  <script>
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
    }
  </script>

</body>
</html>
